# App Stream Definitions
#
# Declares sub-streams that exist under an app's {appStreamId}.
# Each app/bridge access declares clientData.appStreamId (e.g. "bridge-mira-app").
# Consuming apps discover these sub-streams by appending the suffix.
#
# Example: appStreamId = "bridge-mira-app"
#   → "bridge-mira-app-notes" (suffix: notes)
#   → "bridge-mira-app-chat"  (suffix: chat)
#
# The "system-out" / "system-in" entries below describe the account-level
# system-stream pair provisioned once by the user's HDS-aware client app
# (typically hds-webapp) at account setup. CollectorRequests reference these
# streams via existingStreamRefs[] to send/receive structured system messages
# (alerts + acks). See Plan 45 §2.7 + spec.md for full design.

notes:
  suffix: notes
  eventType: note/txt
  label:
    en: Notes
    fr: Notes
  description:
    en: Free text notes from this application
    fr: Notes libres de cette application
  display: diary

chat:
  suffix: chat
  eventType: message/hds-chat-v1
  label:
    en: Chat Messages
    fr: Messages
  description:
    en: Chat messages with this connection
    fr: Messages de chat avec cette connexion
  display: chat

system-out:
  suffix: system-out
  eventType: message/system-alert
  label:
    en: System Out (alerts to user)
    fr: Système sortant (alertes vers l'utilisateur)
  description:
    en: Structured alerts written by requesters and read by the user. Account-level fixture (provisioned once by the user's client app).
    fr: Alertes structurées écrites par les demandeurs et lues par l'utilisateur. Élément de compte (provisionné une fois par l'application cliente de l'utilisateur).
  display: system

system-in:
  suffix: system-in
  eventType: message/system-ack
  label:
    en: System In (acknowledgements to requester)
    fr: Système entrant (accusés de réception vers le demandeur)
  description:
    en: Acknowledgements written by the user and read by requesters, paired with their alert via ackId. Account-level fixture.
    fr: Accusés de réception écrits par l'utilisateur et lus par les demandeurs, appariés à leur alerte via ackId. Élément de compte.
  display: system

webapp-settings:
  suffix: webapp-settings
  eventType: settings/hds-react-timeline
  label:
    en: Webapp Settings
    fr: Paramètres de l'application
  description:
    en: User-scoped settings for HDS client apps. Holds one event per feature (distinguished by eventType, e.g. settings/hds-react-timeline). Single recurring event per type, updated in place.
    fr: Paramètres propres à l'utilisateur pour les applications client HDS. Contient un événement par fonctionnalité (distingué par eventType, ex. settings/hds-react-timeline). Un seul événement récurrent par type, mis à jour sur place.
  display: system
