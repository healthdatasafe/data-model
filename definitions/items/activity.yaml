# Physical activity items — self-reported exercise tracking.
# See documentation/PHYSICAL-ACTIVITY.md for cross-system compatibility.
#
# Model (Plan 77 / data-model#19):
#   - <activity>            : deprecated occurrence marker (eventType activity/plain).
#                            Kept so existing events keep resolving; hidden from pickers.
#   - <activity>-intensity : go-forward item (eventType ratio/proportion, WHO/ACSM 3-level
#                            Light/Moderate/Vigorous). Presence-only sources may still write
#                            the deprecated occurrence item.
# Both itemDefs share the same streamId (identity is streamId:eventType).
# Maps to Apple HealthKit HKWorkoutActivityType and SNOMED CT codes.

## Yoga
activity-yoga:
  version: v1
  label: Yoga
  description: Deprecated — use activity-yoga-intensity to record a yoga session with intensity.
  deprecated: true
  streamId: activity-yoga
  eventType: activity/plain
  type: checkbox
  repeatable: unlimited

activity-yoga-intensity:
  version: v1
  label:
    en: Yoga
    fr: Yoga
  description:
    en: Yoga session, with intensity.
    fr: Séance de yoga, avec intensité.
  streamId: activity-yoga
  eventType: ratio/proportion
  type: select
  options:
    - value: 0.25
      label:
        en: Light intensity
        fr: Intensité légère
    - value: 0.5
      label:
        en: Moderate intensity
        fr: Intensité modérée
    - value: 1.0
      label:
        en: Vigorous intensity
        fr: Intensité élevée
  repeatable: unlimited

