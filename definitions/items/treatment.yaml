treatment-basic:
  version: v1
  label: Treatment (free-text)
  description: Free-text clinical treatment — IVF, chemotherapy, CBT, dialysis, etc.
  streamId: treatment
  eventType: treatment/basic
  duration:
    mandatory: false
    canBeNull: true
    maxSeconds: 315360000 # 10 years — accommodates lifelong HRT, multi-year IVF journey, chemotherapy regimens
  type: composite
  composite:
    name:
      label: Treatment name
      type: text
    count:
      label: Number of times (lifetime)
      type: number
      canBeNull: true
    notes:
      label: Notes
      type: text
      canBeNull: true
  repeatable: unlimited

treatment-coded:
  version: v1
  label: Treatment (coded)
  description: Search and select a coded clinical treatment.
  streamId: treatment
  eventType: treatment/coded-v1
  duration:
    mandatory: false
    canBeNull: true
    maxSeconds: 315360000 # 10 years
  type: datasource-search
  datasource: treatment
  repeatable: unlimited
