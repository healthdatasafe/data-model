      label:
        en: Not depressed
        fr: Pas déprimé
    - value: 0.25
      label:
        en: Slightly depressed
        fr: Légèrement déprimé
    - value: 0.5
      label:
        en: Moderately depressed
        fr: Modérément déprimé
    - value: 0.75
      label:
        en: Severely depressed
        fr: Sévèrement déprimé
    - value: 1.0
      label:
        en: Extremely depressed
        fr: Extrêmement déprimé
  repeatable: unlimited
  references:
    snomed: "366979004"
    loinc: "75275-8"

# Self-rated health ("SRH") — the most validated single-item PRO in epidemiology.
# One item covers both common capture formats: continuous 0..100 VAS (stored 0..1 at
# step 0.01) and 5-level categorical (SF-1 / PROMIS Global01 / NHIS SRH question,
# mapped to the canonical 5-level hooks 0.0/0.25/0.5/0.75/1.0).

wellbeing-self-rated-health:
  version: v1
  label:
    en: Self-rated health
    fr: Auto-évaluation de la santé
  description:
    en: Overall self-rated health. Stored as ratio/proportion (0..1); a continuous VAS form stores at step 0.01 (displayed 0..100), a 5-level categorical form (SF-1 / PROMIS Global01) uses the canonical hooks 0.0 (Poor) / 0.25 (Fair) / 0.5 (Good) / 0.75 (Very good) / 1.0 (Excellent). Used by EQ VAS, SF-36 GH item 1, PROMIS Global01, SF-1, NHIS / MEPS / ESS / SILC SRH questions.
    fr: Auto-évaluation globale de la santé. Stocké comme ratio/proportion (0..1) ; un formulaire VAS continu utilise un pas de 0.01 (affiché 0..100), un formulaire catégoriel à 5 niveaux (SF-1 / PROMIS Global01) utilise les points canoniques 0.0 (Médiocre) / 0.25 (Passable) / 0.5 (Bonne) / 0.75 (Très bonne) / 1.0 (Excellente). Utilisé par EQ VAS, SF-36 GH item 1, PROMIS Global01, SF-1 et les questions SRH des enquêtes NHIS / MEPS / ESS / SILC.
  streamId: wellbeing-self-rated-health
  eventType: ratio/proportion
  type: number
  repeatable: unlimited
  references:
    snomed: ["425058002", "104346004"]
    loinc: ["72006-0", "32622-6", "82589-3"]
