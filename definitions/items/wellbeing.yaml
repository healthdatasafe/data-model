# Self-rated health ("SRH") — the most validated single-item PRO in epidemiology.
# One item covers both common capture formats: continuous 0..100 VAS (stored 0..1 at
# step 0.01) and 5-level categorical (SF-1 / PROMIS Global01 / NHIS SRH question,
# mapped to the canonical 5-level hooks 0.0/0.25/0.5/0.75/1.0).

wellbeing-self-rated-health:
  version: v1
  label:
    en: Self-rated health
    fr: Auto-évaluation de la santé
  description:
    en: Your overall health today.
    fr: Votre état de santé global aujourd'hui.
  streamId: wellbeing-self-rated-health
  eventType: ratio/proportion
  type: slider
  min: 0
  max: 1
  step: 0.01
  slider:
    # orientation defaults to "horizontal" — matches typical web form UX
    display:
      multiplier: 100   # patient sees 0..100 on the slider; storage is raw 0..1
      precision: 0
    labels:
      0:
        label:
          en: Worst health
          fr: Pire santé
        description:
          en: The worst health you can imagine
          fr: La pire santé que vous puissiez imaginer
      1:
        label:
          en: Best health
          fr: Meilleure santé
        description:
          en: The best health you can imagine
          fr: La meilleure santé que vous puissiez imaginer
  repeatable: unlimited
  references:
    snomed: ["425058002", "104346004"]
    loinc: ["72006-0", "32622-6", "82589-3"]
