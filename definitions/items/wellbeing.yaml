# Wellbeing items — subjective behavioral / psychological self-reports.

wellbeing-mood:
  version: v2
  label:
    en: Mood
    fr: Humeur
  description:
    en: How you feel — pleasantness, energy, sense of control, and more.
    fr: Comment vous vous sentez — agrément, énergie, sentiment de contrôle, et plus.
  streamId: wellbeing-mood
  eventType: mood/5d-vectors
  type: convertible
  converter-engine:
    key: euclidian-distance
    version: v0
    models: mood
  composite:
    valence:
      label:
        en: Valence
        fr: Valence
      type: select
      canBeNull: true
      options:
        - value: 0.0
          label:
            en: Very unpleasant
            fr: Très désagréable
        - value: 0.25
          label:
            en: Unpleasant
            fr: Désagréable
        - value: 0.5
          label:
            en: Neutral
            fr: Neutre
        - value: 0.75
          label:
            en: Pleasant
            fr: Agréable
        - value: 1.0
          label:
            en: Very pleasant
            fr: Très agréable
    arousal:
      label:
        en: Energy
        fr: Énergie
      type: select
      canBeNull: true
      options:
        - value: 0.0
          label:
            en: Very calm
            fr: Très calme
        - value: 0.25
          label:
            en: Calm
            fr: Calme
        - value: 0.5
          label:
            en: Moderate
            fr: Modéré
        - value: 0.75
          label:
            en: Energized
            fr: Énergique
        - value: 1.0
          label:
            en: Very energized
            fr: Très énergique
    dominance:
      label:
        en: Sense of control
        fr: Sentiment de contrôle
      type: select
      canBeNull: true
      options:
        - value: 0.0
          label:
            en: Powerless
            fr: Impuissant
        - value: 0.25
          label:
            en: Overwhelmed
            fr: Submergé
        - value: 0.5
          label:
            en: Neutral
            fr: Neutre
        - value: 0.75
          label:
            en: In control
            fr: En contrôle
        - value: 1.0
          label:
            en: Very in control
            fr: Très en contrôle
    socialOrientation:
      label:
        en: Social focus
        fr: Focus social
      type: select
      canBeNull: true
      options:
        - value: 0.0
          label:
            en: Self-focused
            fr: Centré sur soi
        - value: 0.5
          label:
            en: Balanced
            fr: Équilibré
        - value: 1.0
          label:
            en: Other-focused
            fr: Centré sur les autres
    temporalFocus:
      label:
        en: Time focus
        fr: Focus temporel
      type: select
      canBeNull: true
      options:
        - value: 0.0
          label:
            en: Past-dwelling
            fr: Tourné vers le passé
        - value: 0.5
          label:
            en: Present
            fr: Présent
        - value: 1.0
          label:
            en: Future-anticipating
            fr: Tourné vers le futur
  repeatable: unlimited

wellbeing-sex-drive:
  version: v1
  label:
    en: Sex Drive
    fr: Libido
  description: Self-reported sex drive level.
  streamId: wellbeing-sex-drive
  eventType: ratio/proportion
  type: select
  options:
    - value: 0.25
      label:
        en: Low
        fr: Faible
    - value: 0.50
      label:
        en: Neutral
        fr: Neutre
    - value: 0.75
      label:
        en: High
        fr: Élevée
  repeatable: P1D

# Mental distress — summary severity ratings over a reference period.
# Distinct from wellbeing-mood (momentary affective state); see documentation/SYMPTOMS.md
# design decision #2 (revised) and documentation/MOOD.md for the construct distinction.
# Ships three items to support both combined-PRO forms (EQ-5D D5, K6/K10, WHO-5 inverse)
# and splitting-PRO forms (PHQ, GAD, HADS, DASS-21, PROMIS Emotional Distress).
# Reader convention: when combined + split events coexist at the same time, the split
# subscales are primary; the combined event is a derived/coarser view of the same episode.

wellbeing-mental-distress:
  version: v1
  label:
    en: Mental distress (combined)
    fr: Détresse mentale (combinée)
  description:
    en: Anxiety and low mood, combined.
    fr: Anxiété et humeur basse, combinées.
  streamId: wellbeing-mental-distress
  eventType: ratio/proportion
  type: select
  options:
    - value: 0.0
      label:
        en: Not anxious or depressed
        fr: Ni anxieux ni déprimé
    - value: 0.25
      label:
        en: Slightly anxious or depressed
        fr: Légèrement anxieux ou déprimé
    - value: 0.5
      label:
        en: Moderately anxious or depressed
        fr: Modérément anxieux ou déprimé
    - value: 0.75
      label:
        en: Severely anxious or depressed
        fr: Sévèrement anxieux ou déprimé
    - value: 1.0
      label:
        en: Extremely anxious or depressed
        fr: Extrêmement anxieux ou déprimé
  repeatable: unlimited
  references:
    snomed: ["48694002", "366979004"]

