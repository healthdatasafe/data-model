medication-intake-basic:
  version: v3
  label: Medication Intake Basic
  description: Free-text medication intake with optional dose and route. Content has an 'intake' sub-object following the same structure as medication/coded-v1.
  streamId: medication-intake
  eventType: medication/basic
  type: composite
  composite:
    name:
      label: Name of the medication
      type: text
    doseValue:
      label: Dose amount
      type: number
      canBeNull: true
    doseUnit:
      label: Dose unit
      type: select
      canBeNull: true
      options:
        - value: dose/tablet
          label: { en: Tablet, fr: Comprimé }
        - value: dose/drop
          label: { en: Drop, fr: Goutte }
        - value: dose/puff
          label: { en: Puff, fr: Bouffée }
        - value: dose/application
          label: { en: Application, fr: Application }
        - value: dose/suppository
          label: { en: Suppository, fr: Suppositoire }
        - value: dose/unit
          label: { en: Unit (IU), fr: Unité (UI) }
        - value: mass/mg
          label: { en: mg, fr: mg }
        - value: mass/mcg
          label: { en: μg, fr: μg }
        - value: volume/ml
          label: { en: ml, fr: ml }
    route:
      label: Route of administration
      type: select
      canBeNull: true
      options:
        - value: oral
          label: { en: Oral, fr: Oral }
        - value: sublingual
          label: { en: Sublingual, fr: Sublingual }
        - value: topical
          label: { en: Topical, fr: Topique }
        - value: transdermal
          label: { en: Transdermal, fr: Transdermique }
        - value: inhalation
          label: { en: Inhalation, fr: Inhalation }
        - value: nasal
          label: { en: Nasal, fr: Nasal }
        - value: rectal
          label: { en: Rectal, fr: Rectal }
        - value: vaginal
          label: { en: Vaginal, fr: Vaginal }
        - value: ophthalmic
          label: { en: Ophthalmic, fr: Ophtalmique }
        - value: otic
          label: { en: Otic (ear), fr: Auriculaire }
        - value: intravenous
          label: { en: Intravenous (IV), fr: Intraveineux (IV) }
        - value: intramuscular
          label: { en: Intramuscular (IM), fr: Intramusculaire (IM) }
        - value: subcutaneous
          label: { en: Subcutaneous (SC), fr: Sous-cutané (SC) }
  repeatable: unlimited

medication-intake-coded:
  version: v1
  label: Medication Intake (coded)
  description: Search and select a coded medication from datasets service
  streamId: medication-intake
  eventType: medication/coded-v1
  type: datasource-search
  datasource: medication
  repeatable: unlimited

medication-prescription-coded:
  version: v1
  label: Medication Prescription (coded)
  description: Doctor-prescribed medication with dosage and frequency
  streamId: medication-prescription
  eventType: medication/prescription-v1
  type: datasource-search
  datasource: medication
  repeatable: unlimited
