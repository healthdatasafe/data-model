fertility-cycles-charted-count:
  version: temporary
  deprecated: true
  label: Nb of charted cycles
  description: Number of total charted cycles at this date
  streamId: fertility-cycles-charted-estimation
  eventType: count/generic
  type: number
  repeatable: once
fertility-cycles-average-length:
  version: v1
  label:
    en: Average Cycle Length
    fr: Durée moyenne du cycle
  description:
    en: Your average menstrual cycle length, in days.
    fr: Votre durée moyenne de cycle menstruel, en jours.
  streamId: fertility-cycles-average-length
  eventType: time/d
  type: number
  repeatable: once
fertility-cycles-average-period:
  version: v1
  label:
    en: Average Period Length
    fr: Durée moyenne des règles
  description:
    en: Your average period length, in days.
    fr: Votre durée moyenne des règles, en jours.
  streamId: fertility-cycles-average-period
  eventType: time/d
  type: number
  repeatable: once
fertility-cycles-ovulation:
  version: temporary
  label: Ovulation Day
  description: Flag this day as an ovulation day
  streamId: fertility-cycles-ovulation
  eventType: activity/plain
  type: checkbox
  repeatable: P1D
fertility-cycles-start:
  version: v1
  label: New Cycle
  duration:
    mandatory: false
    canBeNull: true
    maxSeconds: 7776000 # thershold for amenorrhea  90 days
  description: Flag this day as a new cycle start. First day of full menstrual bleeding (Period)
  streamId: fertility-cycles-start
  eventType: activity/plain
  type: checkbox
  repeatable: P1D
  reminder:
    expectedInterval:
      min: P21D
      max: P35D
    cooldown: P10D
  devNotes: |-
    Cycle duration is determined by next fertility cycle date unless duration property is given.
fertility-cycles-period-end:
  version: temporary
  label: End of period.
  description: Last day of periods. First day of period is given by a new cycle indication.
  streamId: fertility-cycles-period
  eventType: activity/plain
  type: checkbox
  repeatable: P1D
  devNotes: |-
    To track start / end of period, use fertility-cycles-start & fertility-cycles-period-end.
fertility-cycles-fertile-window:
  version: temporary
  label: Fertile Window
  description: When a women is considered a fertile
  streamId: fertility-cycles-fertile-window
  eventType: activity/plain
  duration:
    mandatory: true
    canBeNull: false
    maxSeconds: 518400 # maximum known fertile window 6 days
  type: checkbox
  repeatable: P1D
  devNotes: |-
    Use duration property to indicate end of fertile window.
fertility-cycles-peak-day:
  version: v1
  label: Peak day of fertility
  description: When fertility is at its highest point
  streamId: fertility-cycles-peak-day
  eventType: activity/plain
  type: checkbox
  repeatable: P1D
fertility-miscarriages-count:
  version: temporary
  deprecated: true
  label: Nb of miscarriages
  description: |-
    DEPRECATED — record each miscarriage as its own `fertility-pregnancy`
    event with `content = miscarriage`, `time = LMP for that pregnancy`, and
    `duration = LMP→outcome`. Aggregate counts are derived analyst-side from
    the count of such events. The legacy aggregate-count item (this one) is
    retained for backwards compatibility with pre-existing clients only.
  streamId: fertility-miscarriages
  eventType: count/generic
  type: number
  repeatable: once
fertility-ttc-tta:
  version: v1
  label: Trying to conceive / Avoiding pregnancy
  description: Current fertility intention
  streamId: fertility-ttc-tta
  eventType: ratio/generic
  type: select
  options:
    - value: 0
      label: TTA - Not taking risks.  Would take all available measures to end a
        pregnancy.
    - value: 1
      label: TTA - Not taking risks.  Would strongly consider placing baby for
        adoption.
    - value: 2
      label: TTA - Not taking risks.  Would need some time, maybe counseling.
        Ultimately keeping the pregnancy.
    - value: 4
      label: TTA - Not taking risks.  Currently content with family size but a
        surprise pregnancy would be welcome.
    - value: 5
      label: TTW/TTA - "Loosely TTA" known risks are taken in the fertile window.
        "OOPS" pregnancy would be welcome.
    - value: 6
      label: TTW - Charting only for health/curiosity. Unprotected intercourse happens
        whenever. Pregnancy very welcome.
    - value: 7
      label: TTW/TTC - Pregnancy very welcome (moving up the scale in very near
        future).
    - value: 8
      label: TTC - "Excited to start/grow a family TTC" Intentional intercourse every
        cycle. Excited to start/grow a family. But would not use any fertility
        treatments if needed.
    - value: 9
      label: TTC - "Highly hopeful TTC" Intentional intercourse every cycle. Would
        consider some but not all fertility treatments if needed.
    - value: 10
      label: TTC - " Seriously TTC" Intentional intercourse every cycle. Would pursue
        any/ALL fertility treatments or procedures if needed.
  repeatable: P1D
fertility-sexual-activity:
  version: v1
  label: Sexual activity
  description: Potentially reproductive sexual activity
  streamId: fertility-sexual-activity
  eventType: reproductive-sexuality/detailed
  type: select
  repeatable: any
  options:
    - value: 'fertile'
      label: 'Fertile intercourse'
    - value: 'incomplete'
      label: 'No ejaculation (incomplete)'
    - value: 'withdrawal'
      label: 'Withdrawal before ejaculation'
    - value: 'condom'
      label: 'Usage of a condom'
    - value: 'cervical-barrier'
      label: 'Usage of a cervical barrier'
    - value: 'protected'
      label: 'Protected intercourse (unspecified method)'
fertility-genital-contact:
  version: v1
  label: Non-intercourse genital contact
  description: |-
    Genital contact that did not involve intercourse (e.g. external contact,
    manual stimulation involving genital exposure). Relevant for fertility-
    awareness charting because residual sperm exposure can still result in
    pregnancy. Distinct from fertility-sexual-activity, which records
    intercourse variants. Both items can co-exist on the same day if both
    phenomena occurred.
  streamId: fertility-genital-contact
  eventType: activity/plain
  type: checkbox
  repeatable: P1D
fertility-pregnancy:
  version: v2
  label: Pregnancy
  description: Pregnancy
  duration:
    mandatory: true
    canBeNull: true
    maxSeconds: 32400000 # maximum known pregnancy 53 weeks
  streamId: fertility-pregnancies
  eventType: pregnancy/detailed
  devNotes: |-
    One per fetus (can be multiple events sharing the same `time` for multifetal pregnancies).
    The value of `event.time` is the patient's LMP (last menstrual period) date for this
    pregnancy — standard OB/GYN dating convention. Derivations:
      - estimated conception ≈ time + 14 days
      - estimated delivery   ≈ time + 280 days (40 weeks)
      - outcome date          = time + duration
    When content value is 'ongoing', `event.duration` must be `null`.
    For any other value, `event.duration` is the elapsed time from LMP to outcome.
    Use 'very-early-loss' for losses with `duration < 6 weeks` (biochemical / pre-clinical
    pregnancies, typically detected only by hCG without ultrasound confirmation —
    clinically distinct from miscarriage per ESHRE 2022 RPL guideline).
    Use 'miscarriage' for clinically-confirmed losses ≥ 6 weeks.
  type: select
  repeatable: any
  options:
    - value: 'ongoing'
      label: 'Ongoing pregnancy'
    - value: 'very-early-loss'
      label: 'Very early loss (biochemical pregnancy, <6w)'
    - value: 'miscarriage'
      label: 'Miscarriage'
    - value: 'ectopic'
      label: 'Ectopic'
    - value: 'stillbirth'
      label: 'Stillbirth'
    - value: 'livebirth'
      label: 'Live birth'
    - value: 'abortion'
      label: 'Abortion'
fertility-delivery:
  version: v1
  label:
    en: Delivery
    fr: Accouchement
  description:
    en: |-
      Per-baby delivery / birth event. One event per baby in the woman's account. Siblings of multifetal pregnancies share `event.time` (= delivery date) and typically share `mode`; per-baby attributes (birth weight, sex, APGAR, NICU stay, neonatal death) vary. Used together with fertility-pregnancy (`event.time` = LMP). A fertility-delivery event only exists when the corresponding fertility-pregnancy.outcome is 'livebirth' or 'stillbirth'. Field vocabularies aligned to LOINC: 73762-7 (mode), 8339-4 (birth weight), 76689-9 (sex assigned at birth), 9274-2 (5-min APGAR).
    fr: |-
      Événement d'accouchement / de naissance par bébé. Un événement par bébé dans le compte de la femme. Les bébés issus d'une grossesse multifœtale partagent `event.time` (= date d'accouchement) et partagent généralement `mode` ; les attributs par bébé (poids de naissance, sexe, APGAR, séjour en USIN, décès néonatal) varient. Utilisé conjointement avec fertility-pregnancy (`event.time` = LMP). Un événement fertility-delivery n'existe que lorsque le fertility-pregnancy.outcome correspondant est 'livebirth' ou 'stillbirth'. Vocabulaires alignés sur LOINC : 73762-7 (mode), 8339-4 (poids de naissance), 76689-9 (sexe à la naissance), 9274-2 (APGAR à 5 minutes).
  streamId: fertility-deliveries
  eventType: delivery/composite-v1
  type: composite
  repeatable: any
  composite:
    mode:
      label:
        en: Mode of delivery
        fr: Mode d'accouchement
      type: select
      options:
        - value: 'vaginal-spontaneous'
          label: { en: 'Vaginal — spontaneous', fr: 'Vaginal — spontané' }
        - value: 'vaginal-forceps'
          label: { en: 'Vaginal — forceps-assisted', fr: 'Vaginal — assisté par forceps' }
        - value: 'vaginal-vacuum'
          label: { en: 'Vaginal — vacuum-assisted', fr: 'Vaginal — assisté par ventouse' }
        - value: 'cesarean'
          label: { en: 'Cesarean', fr: 'Césarienne' }
        - value: 'unknown'
          label: { en: 'Unknown', fr: 'Inconnu' }
    birthWeight:
      label:
        en: Birth weight (g)
        fr: Poids de naissance (g)
      type: number
      canBeNull: true
    sex:
      label:
        en: Sex assigned at birth
        fr: Sexe à la naissance
      type: select
      canBeNull: true
      options:
        - value: 'male'
          label: { en: 'Male', fr: 'Masculin' }
        - value: 'female'
          label: { en: 'Female', fr: 'Féminin' }
        - value: 'indeterminate'
          label: { en: 'Indeterminate', fr: 'Indéterminé' }
        - value: 'unknown'
          label: { en: 'Unknown', fr: 'Inconnu' }
    apgar5min:
      label:
        en: APGAR score at 5 minutes (0–10)
        fr: Score APGAR à 5 minutes (0–10)
      type: number
      canBeNull: true
    nicuLengthOfStayDays:
      label:
        en: NICU length of stay (days)
        fr: Durée de séjour en USIN (jours)
      type: number
      canBeNull: true
    neonatalDeathDays:
      label:
        en: Days from birth to neonatal death (leave empty if alive)
        fr: Jours entre naissance et décès néonatal (laisser vide si en vie)
      type: number
      canBeNull: true
# Urine hormones. Renamed from fertility-hormone-* to body-urine-hormones-* (key == streamId)
# so the specimen is explicit: serum and urine assays of the same hormone are different
# observations with different reference ranges, and the neutral key used to hide that.
# Serum twins live in body.yaml under body-blood-serum-*.
body-urine-hormones-fsh:
  version: v2
  label:
    en: FSH (urine)
    fr: FSH (urine)
  description:
    en: Follicle-stimulating hormone in your urine.
    fr: Hormone folliculo-stimulante dans vos urines.
  streamId: body-urine-hormones-fsh
  eventType: concentration/iu-l
  type: number
  repeatable: any
  reminder:
    relativeTo: fertility-cycles-start
    relativeDays: [2, 3, 4]
  references:
    snomed: ["167382006"]
body-urine-hormones-hcg:
  version: v2
  label:
    en: hCG (urine)
    fr: hCG (urine)
  description:
    en: Pregnancy hormone in your urine.
    fr: Hormone de grossesse dans vos urines.
  streamId: body-urine-hormones-hcg
  eventType: concentration/iu-l
  type: number
  repeatable: any
  # 67900009 is the unqualified hCG measurement — SNOMED has no quantitative urine-specific
  # concept (167391005 is a 24-hour assay, a different procedure).
  references:
    snomed: ["67900009"]
body-urine-hormones-pdg:
  version: v2
  label:
    en: PdG (urine)
    fr: PdG (urine)
  description:
    en: A progesterone by-product in your urine, showing ovulation has happened.
    fr: Un dérivé de la progestérone dans vos urines, indiquant que l'ovulation a eu lieu.
  streamId: body-urine-hormones-pdg
  eventType: concentration/iu-l
  type: number
  repeatable: any
  # No SNOMED reference: pregnanediol-3-glucuronide has no concept. 89113004 is
  # "Pregnanediol measurement" — a different substance, so it is not used here.
body-urine-hormones-e3g:
  version: v2
  label:
    en: E3G (urine)
    fr: E3G (urine)
  description:
    en: An estrogen by-product in your urine, rising as you approach ovulation.
    fr: Un dérivé de l'œstrogène dans vos urines, augmentant à l'approche de l'ovulation.
  streamId: body-urine-hormones-e3g
  eventType: concentration/ug-l
  type: number
  repeatable: any
  # No SNOMED reference: estrone-3-glucuronide measurement has no concept.
body-urine-hormones-lh:
  version: v2
  label:
    en: LH (urine)
    fr: LH (urine)
  description:
    en: Luteinizing hormone in your urine, which surges just before ovulation.
    fr: Hormone lutéinisante dans vos urines, qui culmine juste avant l'ovulation.
  streamId: body-urine-hormones-lh
  eventType: concentration/iu-l
  type: number
  repeatable: any
  reminder:
    relativeTo: fertility-cycles-start
    relativeDays: [2, 3, 4]
  references:
    snomed: ["167381004"]
# ── Deprecated aliases for the renamed urine hormone keys ────────────────────
# These carry the SAME streamId and eventType as their replacements, so they produce
# identical events — they exist only so consumers still pinned to the old key keep working
# and can migrate on their own schedule. Hidden from pickers (getAllActive); the active item
# owns the streamId:eventType index, so forEvent is unambiguous.
# Remove once bridge-mira and doctor-dashboard are updated.
fertility-hormone-fsh:
  version: v1
  deprecated: true
  label:
    en: FSH (urine, legacy key)
    fr: FSH (urine, ancienne clé)
  description:
    en: Deprecated — use body-urine-hormones-fsh. Same data, renamed so the specimen is explicit.
    fr: Obsolète — utilisez body-urine-hormones-fsh. Mêmes données, renommé pour expliciter le prélèvement.
  streamId: body-urine-hormones-fsh
  eventType: concentration/iu-l
  type: number
  repeatable: any
  devNotes: "Rename alias (Plan 83). Identical to body-urine-hormones-fsh."
fertility-hormone-hcg:
  version: v1
  deprecated: true
  label:
    en: hCG (urine, legacy key)
    fr: hCG (urine, ancienne clé)
  description:
    en: Deprecated — use body-urine-hormones-hcg. Same data, renamed so the specimen is explicit.
    fr: Obsolète — utilisez body-urine-hormones-hcg. Mêmes données, renommé pour expliciter le prélèvement.
  streamId: body-urine-hormones-hcg
  eventType: concentration/iu-l
  type: number
  repeatable: any
  devNotes: "Rename alias (Plan 83). Identical to body-urine-hormones-hcg."
fertility-hormone-pdg:
  version: v1
  deprecated: true
  label:
    en: PdG (urine, legacy key)
    fr: PdG (urine, ancienne clé)
  description:
    en: Deprecated — use body-urine-hormones-pdg. Same data, renamed so the specimen is explicit.
    fr: Obsolète — utilisez body-urine-hormones-pdg. Mêmes données, renommé pour expliciter le prélèvement.
  streamId: body-urine-hormones-pdg
  eventType: concentration/iu-l
  type: number
  repeatable: any
  devNotes: "Rename alias (Plan 83). Identical to body-urine-hormones-pdg."
fertility-hormone-e3g:
  version: v1
  deprecated: true
  label:
    en: E3G (urine, legacy key)
    fr: E3G (urine, ancienne clé)
  description:
    en: Deprecated — use body-urine-hormones-e3g. Same data, renamed so the specimen is explicit.
    fr: Obsolète — utilisez body-urine-hormones-e3g. Mêmes données, renommé pour expliciter le prélèvement.
  streamId: body-urine-hormones-e3g
  eventType: concentration/ug-l
  type: number
  repeatable: any
  devNotes: "Rename alias (Plan 83). Identical to body-urine-hormones-e3g."
fertility-hormone-lh:
  version: v1
  deprecated: true
  label:
    en: LH (urine, legacy)
    fr: LH (urine, ancien)
  description:
    en: Deprecated — use body-urine-hormones-lh. This item was typed mg/L in error; LH is reported in IU/L.
    fr: Obsolète — utilisez body-urine-hormones-lh. Cet item était typé mg/L par erreur ; la LH se mesure en IU/L.
  streamId: body-urine-hormones-lh
  eventType: concentration/mg-l
  type: number
  repeatable: any
  # Kept so existing events (stored with type concentration/mg-l) still resolve and render.
  # The stored numbers are already correct as IU/L — bridge-mira writes Mira's value verbatim
  # and Mira reports LH in mIU/mL, which is numerically identical to IU/L. Only the type label
  # was wrong. The item cannot be retyped in place: stored events carry the old type, and the
  # data lives in users' own accounts, so there is nothing for HDS to migrate.
  # This is the only urine hormone that could be deprecated rather than renamed — the loader
  # rejects two items sharing a streamId:eventType pair, and the others keep their eventType.
  devNotes: "B-2026-07-15-1. Do not use for new data."
fertility-test-opk:
  version: v1
  label: Ovulation test (OPK)
  description: Ovulation Predictor Kit result. Uses test-result/scale (-1 negative, 0 indeterminate, 1 positive). Intermediate values for semi-quantitative results (e.g. 0.5 weak positive).
  streamId: fertility-test-opk
  eventType: test-result/scale
  type: number
  repeatable: any
fertility-test-pregnancy:
  version: v1
  label: Pregnancy test
  description: Home pregnancy test result. Uses test-result/scale (-1 negative, 0 indeterminate, 1 positive).
  streamId: fertility-test-pregnancy
  eventType: test-result/scale
  type: number
  repeatable: any

