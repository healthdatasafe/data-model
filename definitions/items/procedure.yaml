procedure-basic:
  version: v1
  label: Procedure (free-text)
  description: Free-text clinical procedure (single dated event) — laparoscopy, HSG, polypectomy, etc. 'findings' captures procedure-bound observations (open vocabulary; form preset declares which finding types per procedure label). Clinical-domain context is carried by the event's streamId via context-via-substream resolution.
  streamId: procedure
  eventType: procedure/basic
  type: composite
  composite:
    name:
      label: Procedure name
      type: text
    count:
      label: Number of times (lifetime)
      type: number
      canBeNull: true
    notes:
      label: Notes
      type: text
      canBeNull: true
  repeatable: unlimited

procedure-coded:
  version: v1
  label: Procedure (coded)
  description: Search and select a coded clinical procedure from datasets service (SNOMED-CT procedure / ICD-10-PCS / CPT). Clinical-domain context is carried by the event's streamId.
  streamId: procedure
  eventType: procedure/coded-v1
  type: datasource-search
  datasource: procedure
  repeatable: unlimited
