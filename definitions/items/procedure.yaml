procedure-basic:
  version: v1
  label: Procedure (free-text)
  description: Free-text clinical procedure — laparoscopy, HSG, polypectomy, etc.
  streamId: procedure
  eventType: procedure/basic
  type: composite
  composite:
    name:
      label: Procedure name
      type: text
    count:
      label: Number of times (lifetime)
      type: number
      canBeNull: true
    notes:
      label: Notes
      type: text
      canBeNull: true
  repeatable: unlimited

procedure-coded:
  version: v1
  label: Procedure (coded)
  description: Search and select a coded clinical procedure.
  streamId: procedure
  eventType: procedure/coded-v1
  type: datasource-search
  datasource: procedure
  repeatable: unlimited
