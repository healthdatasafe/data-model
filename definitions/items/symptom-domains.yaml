# Symptom items — additional domains (Plan 77 / data-model#19 §2).
# See documentation/SYMPTOMS.md for cross-system compatibility research.
#
# Model: each concept has BOTH a live occurrence item (eventType activity/plain)
# and a live severity item (eventType ratio/proportion, 5-level) on the same
# streamId. Unlike Plan-77 §1 (existing items), the occurrence twin here is NOT
# deprecated — these are greenfield concepts and presence-only logging stays valid.
# 5-level hooks 0.0/0.25/0.5/0.75/1.0 (semantic anchors; see DESIGN-NOTES.md).

## Respiratory
symptom-respiratory-cough:
  version: v1
  label:
    en: Cough
    fr: Toux
  description:
    en: Coughing.
    fr: Toux.
  streamId: symptom-respiratory-cough
  eventType: activity/plain
  type: checkbox
  repeatable: unlimited

symptom-respiratory-cough-severity:
  version: v1
  label:
    en: Cough
    fr: Toux
  description:
    en: Coughing.
    fr: Toux.
  streamId: symptom-respiratory-cough
  eventType: ratio/proportion
  type: select
  options: &sev5
    - value: 0.0
      label:
        en: None
        fr: Aucun
    - value: 0.25
      label:
        en: Slight
        fr: Léger
    - value: 0.5
      label:
        en: Moderate
        fr: Modéré
    - value: 0.75
      label:
        en: Severe
        fr: Sévère
    - value: 1.0
      label:
        en: Extreme
        fr: Extrême
  repeatable: unlimited
  references:
    snomed: ["49727002"]

