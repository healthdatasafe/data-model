# Symptom items — self-reported symptom observations.
# See documentation/SYMPTOMS.md for cross-system compatibility research
# (Apple HealthKit, SNOMED CT, FHIR, Ovia, Mira).
#
# Model (Plan 77 / data-model#19):
#   - symptom-<...>          : deprecated occurrence marker (eventType activity/plain).
#                             Kept so existing events keep resolving; hidden from pickers.
#   - symptom-<...>-severity : go-forward item (eventType ratio/proportion, 5-level severity
#                             None/Slight/Moderate/Severe/Extreme). Presence-only sources may
#                             still write the deprecated occurrence item.
# Both itemDefs share the same streamId (identity is streamId:eventType).
# 5-level hooks 0.0/0.25/0.5/0.75/1.0 — semantic anchors (see DESIGN-NOTES.md); 4-level
# sources (Apple HKCategoryValueSeverity, Mira level, MSQ 0–3) map as a subset by label.
#
# Categories follow clinical body-system groupings.

## Gastrointestinal
symptom-gastrointestinal-nausea:
  version: v1
  label: Nausea
  description: Deprecated — use symptom-gastrointestinal-nausea-severity to record nausea with severity.
  deprecated: true
  streamId: symptom-gastrointestinal-nausea
  eventType: activity/plain
  type: checkbox
  repeatable: unlimited

symptom-gastrointestinal-nausea-severity:
  version: v1
  label:
    en: Nausea
    fr: Nausée
  description:
    en: Feeling of nausea or urge to vomit.
    fr: Sensation de nausée ou envie de vomir.
  streamId: symptom-gastrointestinal-nausea
  eventType: ratio/proportion
